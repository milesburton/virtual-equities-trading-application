# supervisord configuration for Fly.io single-VM deployment.
# Starts all backend Deno services + Traefik reverse proxy + static frontend + Redpanda.
# All services communicate on localhost with fixed ports.

[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
loglevel=info
user=root

[program:traefik]
command=/usr/local/bin/traefik --configFile=/app/traefik-fly.yml
autostart=true
autorestart=true
priority=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:redpanda]
command=bash -c "mkdir -p /var/lib/redpanda/data /etc/redpanda && /usr/local/bin/rpk redpanda start --mode=dev-container --smp=1 --memory=200M --default-log-level=warn --kafka-addr=0.0.0.0:9092 --advertise-kafka-addr=localhost:9092"
autostart=true
autorestart=true
priority=2
startsecs=8
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:redpanda-console]
command=/usr/local/bin/redpanda-console
environment=KAFKA_BROKERS="localhost:9092",SERVER_LISTENPORT="8081"
autostart=true
autorestart=true
priority=5
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:market-sim]
command=deno run --allow-all /app/backend/src/market-sim/market-sim.ts
environment=MARKET_SIM_PORT="5000",REDPANDA_BROKERS="localhost:9092"
directory=/app
autostart=true
autorestart=true
priority=10
startsecs=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:observability]
command=deno run --allow-all /app/backend/src/observability/observability-server.ts
environment=OBSERVABILITY_PORT="5007",OBS_DB_PATH="/app/backend/data/observability.db",OBS_RETENTION_MS="86400000",REDPANDA_BROKERS="localhost:9092",MARKET_SIM_PORT="5000",EMS_PORT="5001",OMS_PORT="5002",ALGO_TRADER_PORT="5003",TWAP_ALGO_PORT="5004",POV_ALGO_PORT="5005",VWAP_ALGO_PORT="5006",USER_SERVICE_PORT="5008",JOURNAL_PORT="5009"
directory=/app
autostart=true
autorestart=true
priority=10
startsecs=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:ems]
command=deno run --allow-all /app/backend/src/ems/ems-server.ts
environment=EMS_PORT="5001",MARKET_SIM_HOST="localhost",MARKET_SIM_PORT="5000",EMS_PARTICIPATION_CAP="0.20",EMS_IMPACT_PER_1000_BPS="1.0",REDPANDA_BROKERS="localhost:9092"
directory=/app
