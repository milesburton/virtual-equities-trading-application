; socat permanently holds port 8080 and proxies to Vite on 5173.
; VSCode's port forwarding tunnel never sees 8080 go dark — even when
; Vite restarts, socat keeps the TCP listener bound and retries connections.
[program:frontend-proxy]
command=socat TCP-LISTEN:8080,fork,reuseaddr TCP:localhost:5173
autostart=true
autorestart=true
priority=2
stdout_logfile=AUTO
stderr_logfile=AUTO

