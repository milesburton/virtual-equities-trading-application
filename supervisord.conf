[unix_http_server]
file=/tmp/supervisor.sock

[supervisord]
nodaemon=true

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[program:redpanda]
command=bash -c 'mkdir -p /var/lib/redpanda/data /etc/redpanda ~/redpanda-wrapper/bin && printf "#!/bin/bash\nif [ \"\$1\" = \"redpanda\" ]; then shift; fi\nexec /usr/local/lib/redpanda/ld.so --library-path /usr/local/lib/redpanda /usr/local/bin/redpanda \"\$@\"\n" > ~/redpanda-wrapper/bin/redpanda && chmod +x ~/redpanda-wrapper/bin/redpanda && /usr/local/bin/rpk redpanda start --install-dir ~/redpanda-wrapper --mode=dev-container --smp=1 --memory=200M --default-log-level=warn --kafka-addr=0.0.0.0:9092 --advertise-kafka-addr=localhost:9092 --advertise-rpc-addr=localhost:33145'
autostart=true
autorestart=true
priority=1
startsecs=8
stdout_logfile=AUTO
stderr_logfile=AUTO

[program:market-sim]
command=bash -c 'source /workspaces/virtual-equities-trading-application/.env 2>/dev/null; deno run --allow-all /workspaces/virtual-equities-trading-application/backend/src/market-sim/market-sim.ts'
directory=/workspaces/virtual-equities-trading-application
autostart=true
autorestart=true
stdout_logfile=AUTO
stderr_logfile=AUTO

