name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-test:
    name: Lint, type-check, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.x

      - name: Install backend dependencies
        run: deno install

      - name: Lint
        run: deno task lint

      - name: Type check
        run: deno task check

      - name: Unit tests
        run: deno task test

  frontend:
    name: Frontend lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            ~/.npm
          key: npm-${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json', 'frontend/package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-frontend-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Biome lint
        working-directory: frontend
        run: npx @biomejs/biome check src/

      - name: TypeScript type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Vitest unit tests
        working-directory: frontend
        run: npm run test:unit -- --run

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.x

      - name: Install backend dependencies
        run: deno install

      - name: Start backend services
        run: |
          SHA=$(git rev-parse --short HEAD)
          COMMIT_SHA=$SHA MARKET_SIM_PORT=5000 deno run --allow-all backend/src/market-sim/market-sim.ts &
          COMMIT_SHA=$SHA EMS_PORT=5001 deno run --allow-all backend/src/ems/ems-server.ts &
          COMMIT_SHA=$SHA OMS_PORT=5002 ALGO_TRADER_PORT=5003 TWAP_ALGO_PORT=5004 POV_ALGO_PORT=5005 VWAP_ALGO_PORT=5006 deno run --allow-all backend/src/oms/oms-server.ts &
          COMMIT_SHA=$SHA ALGO_TRADER_PORT=5003 deno run --allow-all backend/src/algo/limit-strategy.ts &
          COMMIT_SHA=$SHA TWAP_ALGO_PORT=5004 deno run --allow-all backend/src/algo/twap-strategy.ts &
          COMMIT_SHA=$SHA POV_ALGO_PORT=5005 deno run --allow-all backend/src/algo/pov-strategy.ts &
          COMMIT_SHA=$SHA VWAP_ALGO_PORT=5006 deno run --allow-all backend/src/algo/vwap-strategy.ts &

      - name: Wait for services to be ready
        run: |
          for port in 5000 5001 5002 5003 5004 5005 5006; do
            for i in $(seq 1 20); do
              curl -sf http://localhost:$port/health && break || sleep 1
            done
          done

      - name: Wait for market data (EMS needs prices before integration tests)
        run: |
          for i in $(seq 1 30); do
            PRICE=$(curl -sf http://localhost:5000/assets | python3 -c "import sys,json; data=json.load(sys.stdin); print(data[0]['price'] if data else 0)" 2>/dev/null || echo 0)
            if [ "$PRICE" != "0" ] && [ -n "$PRICE" ]; then
              echo "Market data ready: AAPL price=$PRICE"
              break
            fi
            echo "Waiting for market tick ($i/30)..."
            sleep 2
          done

      - name: Integration tests
        run: deno task test:integration

      - name: Smoke tests
        run: deno task test:smoke

  playwright-ui:
    name: Playwright UI tests
    runs-on: ubuntu-latest
    needs: [frontend, integration]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache npm and Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            ~/.npm
            ~/.cache/ms-playwright
          key: npm-playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'frontend/package.json') }}
          restore-keys: |
            npm-playwright-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run Playwright UI tests (headless)
        working-directory: frontend
        run: npx playwright test --reporter=list
        env:
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint-and-test, frontend, integration, playwright-ui]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
