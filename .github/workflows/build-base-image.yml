name: Build Dev Container Base Image

on:
  push:
    branches: [main]
    paths: ['.devcontainer/Dockerfile.base']
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and push devcontainer base image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile.base
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/devcontainer-base:latest
            ghcr.io/${{ github.repository }}/devcontainer-base:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
