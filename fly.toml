# Fly.io configuration for Virtual Equities Trading Application
# Deploy with: flyctl deploy

app = "virtual-equities-trading"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  args = {}

[env]
  # Default environment - can be overridden via flyctl secrets/variables
  MARKET_SIM_PORT = "5000"
  EMS_PORT = "5001"
  OMS_PORT = "5002"
  ALGO_TRADER_PORT = "5003"
  TWAP_ALGO_PORT = "5004"
  POV_ALGO_PORT = "5005"
  VWAP_ALGO_PORT = "5006"
  OBSERVABILITY_PORT = "5007"
  FRONTEND_PORT = "8080"

[http_service]
  internal_port = 80
  force_https = true
  auto_start_machines = true
  auto_stop_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "90s"
    interval = "30s"
    timeout = "10s"
    type = "http"
    method = "GET"
    path = "/health"

[mounts]
  source = "data"
  destination = "/app/backend/data"
  initial_size = "1gb"

[[vm]]
  memory = "256mb"
  cpus = 1
